name: Publish The Hetero Herald

on:
  schedule:
    # Tuesday 15:00 UTC (~7am PT) — after Monday Night Football finalizes.
    - cron: '0 15 * * 2'
  workflow_dispatch:      # lets you trigger a run manually from the Actions tab
    inputs:
      week:
        description: 'Week to publish (leave blank to auto-pick the oldest unpublished week)'
        required: false
        default: ''

permissions:
  contents: write         # allow committing generated files back to the repo

concurrency:
  group: herald-publish   # never let two runs race each other into a push conflict
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Generate this week's issue (if any is due)
        env:
          LEAGUE_ID: ${{ vars.LEAGUE_ID }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          FIRST_PUBLISH: ${{ vars.FIRST_PUBLISH }}
          PUBLISH_WEEK: ${{ inputs.week }}
          FORM_LINK: ${{ vars.FORM_LINK }}
          SUBMISSIONS_CSV: ${{ vars.SUBMISSIONS_CSV }}
        run: npm run generate

      - name: Commit & publish any new issue (and persist the caches)
        run: |
          git config user.name  "Herald Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/ data-cache/ || true
          if git diff --staged --quiet; then
            echo "Nothing to publish this week."
          else
            git commit -m "Herald: auto-publish $(date -u +%F)"
            git pull --rebase --autostash origin main || true
            git push
          fi
